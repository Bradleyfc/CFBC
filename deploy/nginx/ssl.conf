"""
================================================================================
  SSL/TLS Configuration
  =====================
  
  This file is included by nginx.conf for the HTTPS server block.
  
  Certificate Management:
    - Use Let's Encrypt with certbot for free SSL certificates
    - Auto-renewal: certbot renew --deploy-hook "systemctl reload nginx"
    - For staging/testing: self-signed certificates
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout /etc/ssl/cfbc/cfbc.key \
          -out /etc/ssl/cfbc/cfbc.crt
================================================================================
"""

# ─────────────────────────────────────────────────────────────────────────────
# SSL Certificate Paths
# ─────────────────────────────────────────────────────────────────────────────
ssl_certificate     /etc/ssl/cfbc/cfbc.crt;
ssl_certificate_key /etc/ssl/cfbc/cfbc.key;

# ─────────────────────────────────────────────────────────────────────────────
# SSL Protocol Configuration
# ─────────────────────────────────────────────────────────────────────────────
ssl_protocols TLSv1.2 TLSv1.3;          # Only modern protocols
ssl_prefer_server_ciphers on;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# ─────────────────────────────────────────────────────────────────────────────
# DH Parameters (for Forward Secrecy)
# ─────────────────────────────────────────────────────────────────────────────
# Generate with: openssl dhparam -out /etc/nginx/dhparam.pem 2048
ssl_dhparam /etc/nginx/dhparam.pem;

# ─────────────────────────────────────────────────────────────────────────────
# SSL Session Cache
# ─────────────────────────────────────────────────────────────────────────────
ssl_session_cache shared:SSL:50m;        # 50MB shared cache
ssl_session_timeout 1d;                  # Cache sessions for 1 day
ssl_session_tickets off;                 # Better security without tickets

# ─────────────────────────────────────────────────────────────────────────────
# OCSP Stapling
# ─────────────────────────────────────────────────────────────────────────────
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# ─────────────────────────────────────────────────────────────────────────────
# HSTS (Handled in nginx.conf for clarity)
# Strict-Transport-Security is set in the main server block
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Performance: SSL Session Reuse
# ─────────────────────────────────────────────────────────────────────────────
# Enable SSL session resumption for faster reconnections
ssl_early_data on;                       # TLS 1.3 0-RTT

# ─────────────────────────────────────────────────────────────────────────────
# Let's Encrypt Auto-Renewal
# ─────────────────────────────────────────────────────────────────────────────
# Add to crontab:
#   0 0 * * * certbot renew --deploy-hook "systemctl reload nginx"
# ─────────────────────────────────────────────────────────────────────────────
