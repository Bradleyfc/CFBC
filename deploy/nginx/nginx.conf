"""
================================================================================
  Nginx Main Configuration
  ========================
  
  This is the main Nginx configuration file for the CFBC Django application.
  It serves as both a reverse proxy and load balancer for multiple Gunicorn
  application instances.
  
  IMPORTANT: This config uses only built-in Nginx features available in the
  standard nginx:1.25-alpine Docker image and official Nginx packages.
  No third-party modules are required.
  
  Session persistence is achieved via Redis (already configured in settings.py).
  Nginx uses ip_hash for best-effort session affinity.
  Passive health checks (max_fails + fail_timeout) handle instance failures.
  
  Architecture:
    ┌──────────┐     ┌──────────┐     ┌──────────────┐
    │  Client  │────▶│  Nginx   │────▶│  Gunicorn    │
    │  HTTPS   │     │  :443    │     │  (multiple   │
    └──────────┘     │  :80     │     │   instances) │
                     └──────────┘     └──────────────┘
================================================================================
"""

# ─────────────────────────────────────────────────────────────────────────────
# Global Settings
# ─────────────────────────────────────────────────────────────────────────────
user nginx;
worker_processes auto;           # Auto-detect CPU cores
pid /var/run/nginx.pid;
worker_rlimit_nofile 65535;      # Max open files per worker (ulimit -n)

# Load dynamic modules (only standard Nginx modules)
# Do NOT add third-party modules here unless you compile Nginx with them.
# The following are standard modules that ship with nginx:1.25-alpine:
# load_module modules/ngx_http_image_filter_module.so;
# load_module modules/ngx_http_perl_module.so;
# load_module modules/ngx_http_xslt_filter_module.so;

events {
    worker_connections 4096;      # Max connections per worker
    use epoll;                    # Linux 2.6+ efficient event model
    multi_accept on;              # Accept all connections at once
    accept_mutex_delay 100ms;     # Delay between accepting connections
}

http {
    # ─────────────────────────────────────────────────────────────────────────
    # Basic Settings
    # ─────────────────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;        # Keep connections alive
    keepalive_requests 1000;      # Max requests per connection
    types_hash_max_size 2048;
    server_tokens off;            # Don't expose Nginx version

    # Client request size limits
    client_max_body_size 60M;     # Max upload size (Django: 50M + overhead)
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ─────────────────────────────────────────────────────────────────────────
    # MIME Types
    # ─────────────────────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'backend=$upstream_addr';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ─────────────────────────────────────────────────────────────────────────
    # Gzip Compression
    # ─────────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─────────────────────────────────────────────────────────────────────────
    # Rate Limiting Zones (shared memory across all workers)
    # ─────────────────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

    # ─────────────────────────────────────────────────────────────────────────
    #  UPSTREAM: Django Application Servers (Gunicorn)
    # ─────────────────────────────────────────────────────────────────────────
    #
    #  Choose ONE upstream block below depending on your deployment:
    #
    #  ┌─ Docker ───────────────────────────────────────────────┐
    #  │  Use 'upstream django_backend' with Docker service     │
    #  │  names. App instances are reachable by container name. │
    #  └────────────────────────────────────────────────────────┘
    #
    #  ┌─ Systemd / Bare Metal ─────────────────────────────────┐
    #  │  Use 'upstream django_backend' with localhost IPs      │
    #  │  and different ports per Gunicorn instance.            │
    #  └────────────────────────────────────────────────────────┘
    #
    #  ╔══════════════════════════════════════════════════════╗
    #  ║  UNCOMMENT THE CORRECT BLOCK FOR YOUR DEPLOYMENT    ║
    #  ║  and delete/comment out the other.                  ║
    #  ╚══════════════════════════════════════════════════════╝
    #
    #  Session persistence: Redis-backed sessions (already configured in
    #  settings.py) make the app stateless. ip_hash provides best-effort
    #  session affinity (no third-party modules needed).
    #  Health checks: Passive (max_fails + fail_timeout) automatically
    #  mark down servers. Active health checks require Nginx Plus.

    # ───── Choose ONE upstream block below for your deployment ─────
    #
    # Docker: Uncomment for Docker Compose (deploy/docker-compose.prod.yml)
    # upstream django_backend {
    #     ip_hash;
    #     server app-1:8000 max_fails=3 fail_timeout=30s weight=1;
    #     server app-2:8000 max_fails=3 fail_timeout=30s weight=1;
    #     server app-3:8000 max_fails=3 fail_timeout=30s weight=1;
    #     server app-4:8000 max_fails=3 fail_timeout=30s weight=1;
    #     keepalive 32;
    # }

    # Systemd / Bare Metal: Active by default
    upstream django_backend {
        ip_hash;
        server 127.0.0.1:8001 max_fails=3 fail_timeout=30s weight=1;
        server 127.0.0.1:8002 max_fails=3 fail_timeout=30s weight=1;
        server 127.0.0.1:8003 max_fails=3 fail_timeout=30s weight=1;
        server 127.0.0.1:8004 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Redirect: HTTP → HTTPS (Port 80)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name cfbc.edu.ni www.cfbc.edu.ni;

        # Redirect all HTTP traffic to HTTPS
        return 301 https://$server_name$request_uri;

        # Let's Encrypt ACME challenge (for SSL cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Main HTTPS Server (Port 443)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name cfbc.edu.ni www.cfbc.edu.ni;

        # ===== SSL Configuration =====
        include /etc/nginx/ssl.conf;

        # ===== Security Headers =====
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ===== Static Files (served directly by Nginx) =====
        location /static/ {
            alias /var/www/cfbc/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;

            # Enable open_file_cache for static files
            open_file_cache max=1000 inactive=20s;
            open_file_cache_valid 60s;
            open_file_cache_min_uses 2;
            open_file_cache_errors on;
        }

        # ===== Media Files (user uploads, served directly by Nginx) =====
        location /media/ {
            alias /var/www/cfbc/media/;
            expires 7d;
            add_header Cache-Control "public, immutable";

            # Don't cache sensitive documents aggressively
            location ~* \.(pdf|doc|docx|xls|xlsx)$ {
                expires 1h;
                add_header Cache-Control "private, must-revalidate";
            }
        }

        # ===== Health Check Endpoint =====
        location /health/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Health check access log (separate from main access log)
            access_log /var/log/nginx/health.log main;

            # Short timeouts for health checks
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;

            # Return error page if all backends are down
            proxy_intercept_errors on;
            error_page 502 503 /health_error.html;
        }

        # ===== Django Application (all other requests) =====
        location / {
            # Rate limiting
            limit_req zone=general burst=200 nodelay;

            # Proxy to Gunicorn upstream
            proxy_pass http://django_backend;

            # Headers for the Django app (so it knows the real client IP)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support (for Django Channels if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
            proxy_temp_file_write_size 32k;

            # Cache control for dynamic content
            proxy_no_cache $cookie_sessionid;
            proxy_cache_bypass $cookie_sessionid;

            # Enable keepalive to upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===== Admin endpoints (separate rate limiting) =====
        location /admin/ {
            # Stricter rate limiting for admin
            limit_req zone=login burst=5 nodelay;

            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== Error Pages =====
        error_page 400 401 402 403 404 /404.html;
        error_page 429 /429.html;
        error_page 500 502 503 504 /500.html;

        # Error page locations (internal: only Nginx can serve these)
        location = /404.html {
            root /var/www/cfbc/staticfiles/error_pages/;
            internal;
        }

        location = /429.html {
            root /var/www/cfbc/staticfiles/error_pages/;
            internal;
        }

        location = /500.html {
            root /var/www/cfbc/staticfiles/error_pages/;
            internal;
        }

        location = /health_error.html {
            root /var/www/cfbc/staticfiles/error_pages/;
            internal;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to sensitive files
        location ~ (\.env|\.git|settings\.py|db\.sqlite3) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
