<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}

    <!-- Tailwind CSS: local primero, CDN de respaldo -->
    <link id="tailwind-local" href="{% static 'css/tailwind.css' %}" rel="stylesheet"
          onerror="this.onerror=null; var s=document.createElement('script'); s.src='https://cdn.tailwindcss.com'; document.head.appendChild(s);">

    <!-- Material Icons: local primero, CDN de respaldo si falla -->
    <link href="{% static 'css/material-icons-local.css' %}" rel="stylesheet"
          onerror="this.onerror=null; var l=document.createElement('link'); l.rel='stylesheet'; l.href='https://cdn.jsdelivr.net/npm/material-icons@latest/iconfont/material-icons.min.css'; document.head.appendChild(l);">
    <link href="{% static 'css/icons.css' %}" rel="stylesheet">

    <!-- Document Icons: local primero, sin CDN de respaldo -->
    <link href="{% static 'css/document-icons.css' %}" rel="stylesheet">
    <title>CFBC</title>

    <style>
        /* Estilos de mensajes usando CSS tradicional con colores de Tailwind */
        .alert-error {
            color: #991b1b; /* text-red-800 */
            background-color: #fecaca; /* bg-red-100 */
            border: 1px solid #fca5a5; /* border-red-300 */
            border-radius: 0.5rem; /* rounded-lg */
            padding: 1rem; /* p-4 */
            margin-bottom: 1rem; /* mb-4 */
        }

        .alert-success {
            color: #166534; /* text-green-800 */
            background-color: #dcfce7; /* bg-green-100 */
            border: 1px solid #86efac; /* border-green-300 */
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .alert-info {
            color: #1e40af; /* text-blue-800 */
            background-color: #dbeafe; /* bg-blue-100 */
            border: 1px solid #93c5fd; /* border-blue-300 */
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .alert-warning {
            color: #92400e; /* text-yellow-800 */
            background-color: #fef3c7; /* bg-yellow-100 */
            border: 1px solid #fcd34d; /* border-yellow-300 */
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .btn-close {
            float: right;
            color: #6b7280; /* text-gray-500 */
            cursor: pointer;
        }

        .btn-close:hover {
            color: #374151; /* hover:text-gray-700 */
        }
    </style>


</head>

<body>
    {% include 'header.html' %}

    {% block messages %}
    <!-- Toast notifications -->
    <style>
        #toast-container {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 999999;
            display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none;
        }
        .app-toast {
            pointer-events: auto; min-width: 280px; max-width: 400px;
            padding: 1rem 1.25rem; border-radius: 16px;
            display: flex; align-items: center; gap: 0.75rem;
            font-size: 0.875rem; font-weight: 500;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.6);
            animation: appToastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .app-toast.saliendo { animation: appToastOut 0.28s ease-in both; }
        @keyframes appToastIn  { from { opacity:0; transform:translateX(60px) scale(0.9); } to { opacity:1; transform:translateX(0) scale(1); } }
        @keyframes appToastOut { from { opacity:1; transform:translateX(0) scale(1); } to { opacity:0; transform:translateX(60px) scale(0.9); } }
        .app-toast.success { background:rgba(220,252,231,0.88); border-color:rgba(134,239,172,0.6); color:#14532d; }
        .app-toast.error   { background:rgba(254,226,226,0.88); border-color:rgba(252,165,165,0.6); color:#7f1d1d; }
        .app-toast.warning { background:rgba(254,243,199,0.88); border-color:rgba(253,224,132,0.6); color:#78350f; }
        .app-toast.info    { background:rgba(219,234,254,0.88); border-color:rgba(147,197,253,0.6); color:#1e3a5f; }
        .app-toast-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .app-toast.success .app-toast-icon { background:rgba(22,163,74,0.15); }
        .app-toast.error   .app-toast-icon { background:rgba(220,38,38,0.15); }
        .app-toast.warning .app-toast-icon { background:rgba(217,119,6,0.15); }
        .app-toast.info    .app-toast-icon { background:rgba(37,99,235,0.15); }
        .app-toast-close { margin-left:auto; opacity:0.5; transition:opacity 0.2s; flex-shrink:0; background:none; border:none; cursor:pointer; padding:0; }
        .app-toast-close:hover { opacity:1; }
        .app-toast-bar { position:absolute; bottom:0; left:0; height:3px; border-radius:0 0 16px 16px; animation:appToastBar 4s linear both; }
        .app-toast.success .app-toast-bar { background:#16a34a; }
        .app-toast.error   .app-toast-bar { background:#dc2626; }
        .app-toast.warning .app-toast-bar { background:#d97706; }
        .app-toast.info    .app-toast-bar { background:#2563eb; }
        @keyframes appToastBar { from { width:100%; } to { width:0%; } }
    </style>
    <div id="toast-container"></div>
    {% if messages %}
    <script>
    (function() {
        var MSGS = [{% for message in messages %}{% if not 'MODAL_DUPLICATE:' in message.message %}{"text":"{{ message|escapejs }}","level":"{{ message.tags }}"},{% endif %}{% endfor %}];
        var ICONS = {success:'check_circle',error:'error',warning:'warning',info:'info'};
        function levelClass(t) {
            if (t.indexOf('error')>=0)   return 'error';
            if (t.indexOf('warning')>=0) return 'warning';
            if (t.indexOf('info')>=0)    return 'info';
            return 'success';
        }
        function cerrarToast(t) {
            t.classList.add('saliendo');
            t.addEventListener('animationend', function(){ t.remove(); }, {once:true});
        }
        function mostrarToast(msg) {
            var c = document.getElementById('toast-container');
            var nivel = levelClass(msg.level);
            var t = document.createElement('div');
            t.className = 'app-toast ' + nivel;
            t.innerHTML = '<div class="app-toast-icon"><span class="material-icons" style="font-size:1.2rem;">'+(ICONS[nivel]||'notifications')+'</span></div>'
                +'<span style="flex:1;line-height:1.4;">'+msg.text+'</span>'
                +'<button class="app-toast-close" onclick="this.closest(\'.app-toast\').dispatchEvent(new Event(\'cerrar\'))"><span class="material-icons" style="font-size:1rem;">close</span></button>'
                +'<div class="app-toast-bar"></div>';
            t.addEventListener('cerrar', function(){ cerrarToast(t); });
            t.addEventListener('click', function(e){ if(!e.target.closest('.app-toast-close')) cerrarToast(t); });
            c.appendChild(t);
            setTimeout(function(){ if(t.parentElement) cerrarToast(t); }, 4000);
        }
        document.addEventListener('DOMContentLoaded', function() {
            var seen = {};
            MSGS.forEach(function(m, i) {
                if (!seen[m.text]) { seen[m.text]=true; setTimeout(function(){ mostrarToast(m); }, i*150); }
            });
        });
    })();
    </script>
    {% endif %}
    {% endblock %}

    {% block content %} {% endblock %}

    {% include 'footer.html' %}

    {% block extra_js %}{% endblock %}
</body>

</html>
