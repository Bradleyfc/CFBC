{% extends 'base.html' %}
{% load static %}

{% block title %}Crear Carpeta - {{ curso.name }}{% endblock %}

{% block content %}
<!-- Background Section with Gradient -->
<div class="w-full bg-gradient-to-br from-gray-100 to-gray-200 relative pb-12">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-30"
        style="background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.05) 1px, transparent 0); background-size: 20px 20px;">
    </div>

    <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        <div class="glass-card">
            <div class="glass-header">
                <h1 class="text-2xl font-bold text-gray-800 text-center">Crear Nueva Carpeta</h1>
            </div>
            <div class="glass-content">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_name" class="block text-sm font-medium text-gray-700 mb-2">
                            Nombre de la carpeta
                        </label>
                        <input type="text" 
                               name="name" 
                               id="id_name"
                               maxlength="200"
                               required
                               class="glass-input"
                               placeholder="Nombre de la carpeta (máximo 200 caracteres)">
                    </div>
                    
                    <div class="flex gap-3 mt-6">
                        <button type="submit" class="glass-button glass-button-primary flex-1">
                            <span class="fa material-icons mr-2">create_new_folder</span></i> Crear Carpeta
                        </button>
                        <a href="{% url 'course_documents:teacher_dashboard' curso_id=curso.id %}" 
                           class="glass-button glass-button-secondary flex-1">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Glass Card */
    .glass-card {
        position: relative;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.1),
            0 4px 16px rgba(0, 0, 0, 0.1),
            inset 0 1px 0 rgba(255, 255, 255, 0.4);
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-header {
        padding: 1.5rem;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.1));
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .glass-content {
        padding: 2rem;
    }

    /* Glass Input */
    .glass-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.2));
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #374151;
        font-size: 0.875rem;
        transition: all 0.3s ease;
    }

    .glass-input:focus {
        outline: none;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.3));
        border-color: rgba(59, 130, 246, 0.5);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Glass Button */
    .glass-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        border-radius: 12px;
        font-weight: 500;
        font-size: 0.875rem;
        text-align: center;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        cursor: pointer;
    }

    .glass-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        text-decoration: none;
    }

    .glass-button-primary {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(37, 99, 235, 0.2));
        color: #1e40af;
    }

    .glass-button-secondary {
        background: linear-gradient(135deg, rgba(156, 163, 175, 0.3), rgba(107, 114, 128, 0.2));
        color: #374151;
    }
</style>
{% endblock %}
