; PgBouncer Configuration
; =======================
; Connection pooler for PostgreSQL.
;
; This configuration is designed for the CFBC Django application.
; It uses transaction-level pooling which is the safest mode for
; Django applications.
;
; Installation:
;   sudo apt-get install pgbouncer
;   sudo cp pgbouncer.ini /etc/pgbouncer/pgbouncer.ini
;   sudo cp pgbouncer.userlist /etc/pgbouncer/userlist.txt
;   sudo systemctl restart pgbouncer

[databases]
; Database connection definitions
; Format: database_name = host=HOST port=PORT dbname=DBNAME
postgre_db = host=localhost port=5432 dbname=postgre_db
read_replica_1 = host=localhost port=5433 dbname=postgre_db
read_replica_2 = host=localhost port=5434 dbname=postgre_db

[pgbouncer]
; Connection settings
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pooling mode
; session  - One connection per session (Django's default)
; transaction - One connection per transaction (recommended for Django)
; statement - One connection per statement (advanced, not recommended for Django)
pool_mode = transaction

; Pool size limits
; These should be tuned based on:
; - PostgreSQL max_connections setting
; - Number of Django application instances
; - Expected concurrent users (1000+)
default_pool_size = 100          ; Max connections per pool (default)
min_pool_size = 10               ; Minimum connections to keep warm
reserve_pool_size = 20           ; Extra connections when pool is exhausted
reserve_pool_timeout = 3.0       ; Seconds before using reserve pool

; Server connection settings
server_check_delay = 30           ; Seconds between server health checks
server_check_query = SELECT 1     ; Query to check server health
server_idle_timeout = 600         ; 10 minutes - close idle server connections
server_lifetime = 3600            ; 1 hour - max connection lifetime
server_reset_query = DISCARD ALL  ; Reset connection state after use

; Client connection settings
client_idle_timeout = 600         ; 10 minutes - close idle client connections
client_login_timeout = 60         ; 1 minute - max time to login
query_timeout = 30                ; 30 seconds - max query execution time
query_wait_timeout = 30           ; 30 seconds - max time to wait for connection

; Connection limits
max_client_conn = 500             ; Max total client connections
max_db_connections = 200          ; Max connections per database
max_user_connections = 100        ; Max connections per user

; Timeout settings
idle_transaction_timeout = 300    ; 5 minutes - rollback idle transactions
cancel_abandoned_transactions = 1 ; Cancel transactions from disconnected clients

; Logging and monitoring
stats_period = 60                 ; Log statistics every 60 seconds
log_connections = 1               ; Log new connections
log_disconnections = 1            ; Log disconnections
log_pooler_errors = 1             ; Log pooler errors
verbose = 0                       ; Verbosity level (0-2)

; Admin console
admin_users = postgre
stats_users = monitoring
;
; === Connection Pool Tuning Guide ===
;
; For 1000+ concurrent users:
;
; 1. default_pool_size: Start with 100, monitor connection wait times.
;    Increase if you see clients waiting (SHOW STATS shows wait_time > 0).
;
; 2. reserve_pool_size: Set to about 20% of default_pool_size.
;    This handles traffic spikes without overwhelming the database.
;
; 3. server_idle_timeout: Keep connections alive during business hours.
;    Set to 600 (10 min) to balance between reuse and resource usage.
;
; 4. Django CONN_MAX_AGE: Set to 0 when using PgBouncer in transaction mode,
;    since PgBouncer manages the connection lifecycle.
;
; === Monitoring Commands ===
;
; Connect to PgBouncer admin console:
;   psql -h 127.0.0.1 -p 6432 pgbouncer -U postgre
;
; Useful commands:
;   SHOW STATS;        - Connection statistics
;   SHOW POOLS;        - Pool status
;   SHOW CLIENTS;      - Active clients
;   SHOW SERVERS;      - Active server connections
;   SHOW DATABASES;    - Database status
;   SHOW CONFIG;       - Current configuration
;   PAUSE;             - Pause pooler for maintenance
;   RESUME;            - Resume pooler after maintenance
;   RECONNECT;         - Force reconnection of all pools
;
; === PgBouncer Integration with Django ===
;
; When using PgBouncer, configure Django settings.py:
;
; DATABASES = {
;     'default': {
;         'ENGINE': 'django.db.backends.postgresql',
;         'NAME': 'postgre_db',
;         'HOST': '127.0.0.1',  # PgBouncer host
;         'PORT': '6432',        # PgBouncer port
;         'CONN_MAX_AGE': 0,     # Let PgBouncer manage connections
;         'OPTIONS': {
;             'connect_timeout': 5,
;         },
;     }
; }
